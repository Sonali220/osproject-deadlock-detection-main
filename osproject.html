<!DOCTYPE html>
<html>
<head>
<title>Deadlock Detection Graph Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #081654, #020004);
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.panel {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    width: 260px;
}

button {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #a30a36;
    color: white;
    cursor: pointer;
}

input {
    margin: 5px;
    padding: 8px;
    width: 80%;
    border-radius: 5px;
    border: none;
}

#graph {
    position: relative;
    width: 700px;
    height: 520px;
    background: white;
    border-radius: 12px;
    border: 2px solid #222;
    overflow: hidden;
}

.node {
    position: absolute;
    width: 70px;
    height: 70px;
    line-height: 70px;
    text-align: center;
    font-weight: bold;
    cursor: grab;
}

.process { background: green; border-radius: 50%; }
.resource { background: red; }

#result {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
}

svg {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<h1>💻 Deadlock Detection Graph Tool</h1>

<div class="container">

<div class="panel">
<button onclick="addNode('process')">Add Process</button>
<button onclick="addNode('resource')">Add Resource</button>

<br><br>

<input id="from" placeholder="From (P1/R1)">
<input id="to" placeholder="To (P1/R1)">
<button onclick="addEdge()">Add Arrow</button>

<br><br>

<button onclick="detectDeadlock()">🚨 Detect Deadlock</button>
<button onclick="clearGraph()">Clear</button>
</div>

<div>
<div id="graph">
<svg id="lines" width="700" height="520"></svg>
</div>

<div id="result"></div>
</div>

</div>

<script>
let nodes = {}, edges = [];

// SERIAL FIX
function getNextId(type) {
    let prefix = type === "process" ? "P" : "R";
    let used = [];

    for (let key in nodes) {
        if (key.startsWith(prefix)) {
            used.push(parseInt(key.slice(1)));
        }
    }

    used.sort((a,b)=>a-b);

    for (let i=1; i<=used.length; i++) {
        if (used[i-1] !== i) return prefix + i;
    }

    return prefix + (used.length + 1);
}

// ADD NODE
function addNode(type) {
    let div = document.createElement("div");
    div.className = "node " + type;

    let id = getNextId(type);
    div.innerText = id;

    div.style.left = Math.random()*600 + "px";
    div.style.top = Math.random()*400 + "px";

    div.ondblclick = () => deleteNode(id, div);

    makeDraggable(div);

    document.getElementById("graph").appendChild(div);
    nodes[id] = div;
}

// DELETE
function deleteNode(id, el) {
    el.remove();
    delete nodes[id];
    edges = edges.filter(e => e.from !== id && e.to !== id);
    redrawEdges();
}

// ADD EDGE
function addEdge() {
    let from = document.getElementById("from").value.trim();
    let to = document.getElementById("to").value.trim();

    if(!nodes[from] || !nodes[to]) {
        alert("Invalid nodes!");
        return;
    }

    edges.push({from, to});
    redrawEdges();
}

// DRAW CURVED EDGES
function redrawEdges() {
    let svg = document.getElementById("lines");
    svg.innerHTML = "";

    edges.forEach((e) => {
        let x1 = nodes[e.from].offsetLeft + 35;
        let y1 = nodes[e.from].offsetTop + 35;
        let x2 = nodes[e.to].offsetLeft + 35;
        let y2 = nodes[e.to].offsetTop + 35;

        let dx = (x1 + x2)/2;
        let dy = (y1 + y2)/2 - 60;

        let path = document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d", `M ${x1} ${y1} Q ${dx} ${dy} ${x2} ${y2}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", e.from.startsWith("P") ? "blue" : "red");
        path.setAttribute("stroke-width", "2");

        svg.appendChild(path);
    });
}

// 🔥 CORRECT DEADLOCK DETECTION
function detectDeadlock() {
    let graph = {};
    let parent = {};
    let cycle = [];

    // Step 1: Build Wait-For Graph
    edges.forEach(e1 => {
        if(e1.from.startsWith("P") && e1.to.startsWith("R")) {

            edges.forEach(e2 => {
                if(e2.from === e1.to && e2.to.startsWith("P")) {

                    if(!graph[e1.from]) graph[e1.from] = [];
                    graph[e1.from].push(e2.to);
                }
            });

        }
    });

    let visited = {}, recStack = {};

    function dfs(node) {
        visited[node] = true;
        recStack[node] = true;

        for(let nei of (graph[node] || [])) {

            if(!visited[nei]) {
                parent[nei] = node;
                if(dfs(nei)) return true;
            }

            else if(recStack[nei]) {
                // 🔥 Build cycle path
                cycle = [nei];
                let cur = node;

                while(cur !== nei) {
                    cycle.push(cur);
                    cur = parent[cur];
                }

                cycle.push(nei);
                cycle.reverse();
                return true;
            }
        }

        recStack[node] = false;
        return false;
    }

    // Reset colors
    Object.values(nodes).forEach(n => {
        if(n.classList.contains("process"))
            n.style.background = "green";
    });

    // Run DFS
    for(let node in graph) {
        if(!visited[node]) {
            if(dfs(node)) {

                // 🔥 Highlight deadlock nodes
                cycle.forEach(p => {
                    if(nodes[p]) {
                        nodes[p].style.background = "yellow";
                        nodes[p].style.color = "black";
                    }
                });

                // 🔥 Suggestion
                let suggestion =
                    "Terminate " + cycle[0] + " OR Preempt a resource";

                document.getElementById("result").innerHTML =
                    "🔴 Deadlock Detected!<br>" +
                    "Cycle: " + cycle.join(" → ") + "<br>" +
                    "Suggestion: " + suggestion;

                return;
            }
        }
    }

    document.getElementById("result").innerHTML =
        "🟢 No Deadlock (Safe State)";
}

// CLEAR
function clearGraph(){
    location.reload();
}

// DRAG
function makeDraggable(el){
    let graph = document.getElementById("graph");
    let isDown=false, offsetX=0, offsetY=0;

    el.onmousedown = e=>{
        isDown=true;
        offsetX=e.offsetX;
        offsetY=e.offsetY;
    };

    document.onmousemove = e=>{
        if(!isDown) return;

        let rect = graph.getBoundingClientRect();

        let x = e.clientX - rect.left - offsetX;
        let y = e.clientY - rect.top - offsetY;

        x = Math.max(0, Math.min(x, graph.clientWidth - el.offsetWidth));
        y = Math.max(0, Math.min(y, graph.clientHeight - el.offsetHeight));

        el.style.left = x+"px";
        el.style.top = y+"px";

        redrawEdges();
    };

    document.onmouseup = ()=> isDown=false;
}
</script>

</body>
</html>
